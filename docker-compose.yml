services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: laravel-local-app
    ports:
      - "9150:9150"
    volumes:
      - ./:/var/www/html
    working_dir: /var/www/html
    command: sh -lc "cp .env.docker .env 2>/dev/null || true && if [ ! -d vendor ]; then composer install --no-interaction --prefer-dist; fi && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=9150"
    environment:
      APP_ENV: local
      APP_DEBUG: '1'
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: global_mission
      DB_USERNAME: laravel
      DB_PASSWORD: secret
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: global_mission
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - "9151:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - mysql

volumes:
  mysql_data:
